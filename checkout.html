<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - GlowMuse Studio</title>
    <!--Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--Custom CSS-->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="index.html">GlowMuse Studio</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="About.html">Dresses</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="Handbags.html">Handbags</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="Contact.html">Our Contacts</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="Cart.html">🛒 Cart (<span id="cart-count">0</span>)</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <h2>Checkout</h2>
        <div class="row">
            <div class="col-md-6">
                <h3>Billing Information</h3>
                <form id="checkout-form">
                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="address" class="form-label">Address</label>
                        <textarea class="form-control" id="address" rows="3" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" id="phone" required>
                    </div>
                    <div class="mb-3">
                        <label for="payment" class="form-label">Payment Method</label>
                        <select class="form-control" id="payment" required>
                            <option value="">Select Payment Method</option>
                            <option value="credit">Credit Card</option>
                            <option value="debit">Debit Card</option>
                            <option value="paypal">PayPal</option>
                            <option value="cash">Cash on Delivery</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="col-md-6">
                <h3>Order Summary</h3>
                <div id="checkout-cart-items"></div>
                <h4>Total: <span id="checkout-total">P0</span></h4>
                <button class="btn btn-success btn-lg" id="place-order-btn">Place Order</button>
                <button class="btn btn-secondary" onclick="window.location.href='Cart.html'">Back to Cart</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy;2026 GlowMuse Studio</p>
    </footer>

    <!--Bootstrap JS and dependencies-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
    <script src="script.js"></script>
    <script>
        // Checkout specific functions
        function displayCheckoutCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const checkoutItems = document.getElementById('checkout-cart-items');
            const checkoutTotal = document.getElementById('checkout-total');

            checkoutItems.innerHTML = '';
            let total = 0;

            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                const itemDiv = document.createElement('div');
                itemDiv.className = 'd-flex justify-content-between mb-2';
                itemDiv.innerHTML = `<span>${item.name} (x${item.quantity})</span><span>${itemTotal}</span>`;
                checkoutItems.appendChild(itemDiv);
            });

            checkoutTotal.textContent = `${total}`;
        }

        function placeOrder() {
            const form = document.getElementById('checkout-form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            // Simulate order placement
            alert('Order placed successfully! Thank you for shopping with GlowMuse Studio.');
            localStorage.removeItem('cart');
            window.location.href = 'index.html';
        }

        document.addEventListener('DOMContentLoaded', function() {
            displayCheckoutCart();
            document.getElementById('place-order-btn').addEventListener('click', placeOrder);
        });
    </script>
</body>
</html>
